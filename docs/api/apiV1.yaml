openapi: 3.0.3

info:
  title: BichoHub API
  version: 1.0.0
  description: API para catalogação, resgate, coleta e condução de animais.

servers:
  - url: http://localhost:6969

tags:
  - name: Usuários
  - name: Coletores

paths:

  /api/v1/usuarios/cadastrar:
    post:
      tags:
        - Usuários
      summary: Criar conta de usuário
      description: Cria um novo usuário e registra suas credenciais com senha criptografada.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nome
                - contato
                - email
                - senha
              properties:
                nome:
                  type: string
                  example: Josué Bichohub
                contato:
                  type: string
                  example: "92999999999"
                email:
                  type: string
                  example: josue@email.com
                senha:
                  type: string
                  format: password
                  example: senha123
      responses:
        '201':
          description: Usuário criado
        '400':
          description: Usuário já existe

  /api/v1/usuarios/login:
    post:
      tags:
        - Usuários
      summary: Login do usuário
      description: Realiza autenticação do usuário e retorna token JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - senha
              properties:
                email:
                  type: string
                  example: josue@email.com
                senha:
                  type: string
                  format: password
                  example: senha123
      responses:
        '200':
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: jwt.token.aqui
        '403':
          description: Usuário não cadastrado ou campos inválidos

  /api/v1/usuarios/registrar-ocorrencia:
    post:
      tags:
        - Usuários
      summary: Registrar ocorrência
      description: Registra uma solicitação de captura/condução/resgate e notifica coletores próximos.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - tipo
                - gps_origem
                - data_captura
                - descricao
              properties:
                tipo:
                  type: integer
                  description: |
                    1 = captura
                    2 = resgate
                    3 = condução
                gps_origem:
                  type: string
                  description: Coordenada no formato WKT POINT(longitude latitude)
                  example: POINT(-60.0217 -3.1190)
                data_captura:
                  type: string
                  format: date-time
                descricao_origem:
                  type: string
                  example: Cobra encontrada em uma bota.
                imagem:
                  type: string
                  format: binary
                estado:
                  type: integer
                  example: 0
      responses:
        '200':
          description: Registro enviado

  /api/v1/coletores/responder/{id}:
    patch:
      tags:
        - Coletores
      summary: Aceitar ou rejeitar chamada
      description: Permite ao coletor aceitar ou rejeitar uma ocorrência.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 10
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - estado
              properties:
                estado:
                  enum: [0, 1, 2, 3, 4]
                  example: 1
                  type: integer
                  description: |
                    0 = Em aberto
                    2 = Em andamento
                    3 = Concluída
                    4 = Cancelada
      responses:
        '200':
          description: Operação realizada com sucesso
        '401':
          description: Usuário não autenticado
        '403':
          description: Usuário não possui permissão de coletor

  /api/v1/usuarios/listar:
    get:
      tags:
        - Usuários
      summary: Recuperar solicitações do usuário
      description: Retorna ocorrências abertas pelo usuário autenticado.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de ocorrências do usuário
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    data_captura:
                      type: string
                      format: date-time
                    descricao_origem:
                      type: string
                    imagem:
                      type: string
                      format: binary
                    estado:
                      type: integer
                    tipo:
                      type: integer
  
  /api/v1/coletores/ocorrencias/listar:
    get:
      tags:
        - Coletores
      summary: Recuperar histórico de ocorrências
      description: Retorna histórico de ocorrências do coletor autenticado.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de ocorrências
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    coletor_id:
                      type: integer
                    origem_solicitacao_id:
                      type: integer
                    gps_origem:
                      type: string
                    gps_destino:
                      type: string
                    data_captura:
                      type: string
                      format: date-time
                    descricao_origem:
                      type: string
                    descricao_destino:
                      type: string
                    observacoes:
                      type: string
                    risco:
                      type: string
                    equipamento_captura:
                      type: string
                    imagem:
                      type: string
                      format: binary
        '401':
          description: Usuário não autorizado
  
  /api/v1/usuarios/coletores-disponiveis:
    get:
      tags:
        - Usuários
      summary: Verificar disponibilidade de coletores
      description: Retorna coletores disponíveis em um determinado horário.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: horario
          required: true
          schema:
            type: string
            format: date-time
          example: "2999-12-31T23:59:59Z"
      responses:
        '200':
          description: Lista de coletores disponíveis
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    nome:
                      type: string
                    contato:
                      type: string
                    inicio_plantao:
                      type: string
                      format: date-time
                    fim_plantao:
                      type: string
                      format: date-time
        '401':
          description: Usuário não autenticado

  /api/v1/coletores/ocorrencias/abertas:
    get:
      tags:
        - Coletores
      summary: Ver chamadas em aberto
      description: Retorna ocorrências que ainda aguardam atendimento.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de ocorrências abertas
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    origem_solicitacao_id:
                      type: integer
                    gps_origem:
                      type: string
                    data_captura:
                      type: string
                      format: date-time
                    descricao_origem:
                      type: string
                    tipo:
                      type: integer
                    estado:
                      type: integer
        '401':
          description: Usuário não autenticado
        '403':
          description: Usuário não possui permissão de coletor

  /api/v1/coletores/ocorrencias/historico:
    get:
      tags:
        - Coletores
      summary: Recuperar histórico geral
      description: Retorna todas as ocorrências cadastradas no sistema.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Histórico geral de ocorrências
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    coletor_id:
                      type: integer
                    origem_solicitacao_id:
                      type: integer
                    gps_origem:
                      type: string
                    gps_destino:
                      type: string
                    data_captura:
                      type: string
                      format: date-time
                    descricao_origem:
                      type: string
                    descricao_destino:
                      type: string
                    observacoes:
                      type: string
                    risco:
                      type: string
                    equipamento_captura:
                      type: string
                    tipo:
                      type: integer
                    estado:
                      type: integer
        '401':
          description: Usuário não autenticado
        '403':
          description: Usuário não possui permissão de coletor

  /api/v1/coletores/ocorrencias/editar/{id}:
    patch:
      tags:
        - Coletores
      summary: Editar informações de chamada
      description: Permite editar informações complementares de uma ocorrência.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 12
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                destino_gps:
                  type: string
                  description: Coordenada no formato WKT POINT(longitude latitude)
                  example: POINT(-60.0123 -3.1010)
                descricao_destino:
                  type: string
                observacoes:
                  type: string
                risco:
                  type: string
                equipamento_captura:
                  type: string
                estado:
                  type: integer
                  enum: [0, 1, 2, 3, 4]
      responses:
        '200':
          description: Ocorrência atualizada
        '401':
          description: Usuário não autenticado
        '403':
          description: Usuário não possui permissão de coletor
        '404':
          description: Ocorrência não encontrada

  /api/v1/coletores/plantoes/{id}:
    patch:
      tags:
        - Coletores
      summary: Editar horários de plantão
      description: Permite atualizar horários e disponibilidade de um plantão.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: ID do plantão a ser atualizado
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                inicio:
                  type: string
                  format: date-time
                fim:
                  type: string
                  format: date-time
                disponivel:
                  type: boolean
      responses:
        '200':
          description: Plantão atualizado
        '401':
          description: Usuário não autenticado
        '403':
          description: Usuário não possui permissão de coletor
        '404':
          description: Plantão não encontrado

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT