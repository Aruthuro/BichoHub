services:
  backend:
    build: .

    container_name: express_backend

    ports:
      - "${PORT}:${PORT}"

    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules

    env_file:
      - .env.development

    depends_on:
      db_postgres:
        condition: service_healthy

    command: npm run dev

  db_postgres:
    image: postgres:15

    container_name: db_postgres

    restart: always

    ports:
      - "${POSTGRES_PORT}:5432"

    env_file:
      - .env.development

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: